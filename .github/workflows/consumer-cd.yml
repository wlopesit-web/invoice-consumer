name: Core Consumer CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  continuous-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Configura o ambiente Java 17 para o script do Maven funcionar
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Autentica na sua conta do Docker Hub usando variáveis secretas do GitHub
      - name: Authenticate to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🚀 CHAMADA DE SHELL SCRIPT 1: Compilação e Geração da Imagem Docker
      - name: Execute Docker Build and Push Shell Script
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
        run: |
          chmod +x ./scripts/build-docker.sh
          ./scripts/build-docker.sh

      # ☸️ CHAMADA DE SHELL SCRIPT 2: Deploy no Cluster Kubernetes Remoto
      - name: Execute Kubernetes Cluster Remoto Remote Deployment Shell Script
        env:
          ORACLE_CLOUD_IP: ${{ secrets.ORACLE_CLOUD_IP }}
        run: |
          chmod +x ./scripts/deploy-k8s.sh
          ./scripts/deploy-k8s.sh
