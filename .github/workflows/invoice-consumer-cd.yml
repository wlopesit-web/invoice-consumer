name: "Invoice Consumer - [CD] Pipeline"

on:
  push:
    branches: [ "main" ]

jobs:
  continuous-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🚀 CD FASE 1: Compila em produção, gera a imagem e envia para o Docker Hub
      - name: Execute Docker Build and Push Shell Script
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ github.sha }} # Tag única baseada no commit do Git
        run: |
          chmod +x ./scripts/cd-build.sh
          ./scripts/cd-build.sh
      # ☸️ CD FASE 2: Atualiza o ambiente no Kubernetes
      - name: Execute Kubernetes Remote Deployment Shell Script
        env:
          ORACLE_CLOUD_IP: ${{ secrets.ORACLE_CLOUD_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x ./scripts/deploy-k8s.sh
          ./scripts/deploy-k8s.sh

